<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Kernel Authority • Access System</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
margin:0;
background:radial-gradient(circle at center,#06110d,#020504);
font-family:'Segoe UI',sans-serif;
color:#e6fff6;
overflow:hidden;
}

/* MATRIX */
#matrix{position:absolute;top:0;left:0;width:100%;height:100%;opacity:0.08;z-index:-2}

/* LAYOUT */
.container{
display:flex;
align-items:center;
justify-content:center;
gap:40px;
height:100vh;
}

/* CARD */
.card{
width:420px;
background:rgba(11,26,21,0.75);
backdrop-filter:blur(14px);
border-radius:18px;
padding:30px;
box-shadow:0 0 60px rgba(0,0,0,0.7);
}

/* PHONE */
.phone{
width:260px;height:520px;background:#111;
border-radius:30px;box-shadow:0 0 40px rgba(0,0,0,.8);
display:flex;align-items:center;justify-content:center;
opacity:0;transform:translateY(40px);
transition:0.8s ease;
}
.phone.show{opacity:1;transform:translateY(0)}

.screen{
position:relative;
width:90%;height:90%;
background:white;border-radius:20px;
overflow:hidden;
}

/* PLUS */
#plus{
position:absolute;top:50%;left:50%;
transform:translate(-50%,-50%);
font-size:50px;color:#4cffc0;
display:none;cursor:pointer;
}
#file{display:none}

/* CROSS BUTTON */
#toggle{
position:fixed;
bottom:20px;
left:20px;
font-size:22px;
color:white;
cursor:pointer;
opacity:.8;
}

/* INPUT */
input{
width:100%;padding:12px;border-radius:10px;
border:1px solid rgba(76,255,192,.25);
background:#050e0b;color:white;
}

/* BUTTON (LOW ANIMATION) */
button{
width:100%;padding:12px;margin-top:14px;
border:none;border-radius:12px;
background:#4cffc0;color:#052019;
cursor:pointer;
transition:0.2s;
}
button:hover{transform:scale(1.02)}
button:active{transform:scale(0.98)}

/* LOG */
.logbox{margin-top:18px;height:30px;font-family:monospace;opacity:0;transition:0.4s}
.logbox.show{opacity:1}

/* BAR */
.bar{width:0%;height:3px;background:#4cffc0;margin-top:6px}

/* RESULT */
.result{display:none;margin-top:15px}
.row{display:flex;justify-content:space-between;padding:10px 0}
.value{color:#4cffc0;letter-spacing:2px}
</style>
</head>

<body>

<canvas id="matrix"></canvas>

<div class="container">

<div class="card">
<h1>Kernel Authority</h1>
<div class="sub">Secure Instagram Access Tool</div>

<input id="user" placeholder="target username...">
<button onclick="start()">Trigger</button>

<div class="logbox" id="log"></div>
<div class="bar" id="bar"></div>

<div class="result" id="res">
<div class="row"><span>Username</span><span class="value">••••••••</span></div>
<div class="row"><span>Email</span><span class="value">••••••••</span></div>
<div class="row"><span>Password</span><span class="value">••••••••</span></div>
</div>
</div>

<div class="phone" id="phone">
<div class="screen" id="screen">
<div id="plus">+</div>
<input type="file" id="file" accept="image/*">
</div>
</div>

</div>

<div id="toggle">✕</div>

<script>

/* MATRIX */
const canvas=document.getElementById("matrix");
const ctx=canvas.getContext("2d");
canvas.width=innerWidth;canvas.height=innerHeight;

const letters="01",fontSize=14;
const columns=canvas.width/fontSize;
const drops=Array(Math.floor(columns)).fill(1);

setInterval(()=>{
ctx.fillStyle="rgba(0,0,0,0.05)";
ctx.fillRect(0,0,canvas.width,canvas.height);
ctx.fillStyle="#4cffc0";
ctx.font=fontSize+"px monospace";

for(let i=0;i<drops.length;i++){
const text=letters[Math.random()*2|0];
ctx.fillText(text,i*fontSize,drops[i]*fontSize);
if(drops[i]*fontSize>canvas.height&&Math.random()>0.95) drops[i]=0;
drops[i]++;
}
},50);

/* LOGS */
const logs=[
"initializing secure gateway...",
"establishing encrypted channel...",
"scanning public endpoints...",
"mapping behavioral patterns...",
"injecting analysis layer...",
"finalizing access..."
];

let i=0;

/* TYPE */
function typeText(text,el,cb){
let x=0;el.innerHTML="";
(function t(){
if(x<text.length){el.innerHTML+=text[x++];setTimeout(t,25);}
else if(cb)cb();
})();
}

/* START */
function start(){
const user=document.getElementById("user");
if(!user.value.trim()) return;

i=0;
document.getElementById("phone").classList.remove("show"); // reset
run();
}

/* RUN */
function run(){
const log=document.getElementById("log");
const bar=document.getElementById("bar");

log.classList.add("show");

if(i>=logs.length){
typeText("> completed",log,()=>{
document.getElementById("res").style.display="block";
document.getElementById("phone").classList.add("show");
});
return;
}

typeText("> "+logs[i],log,()=>{
bar.style.width=((i+1)/logs.length)*100+"%";
i++;
setTimeout(run,800);
});
}

/* DOUBLE TAP IMAGE */
const screen=document.getElementById("screen");
const plus=document.getElementById("plus");
const file=document.getElementById("file");

let lastTap=0;

screen.onclick=()=>{
const now=Date.now();
if(now-lastTap<300){
plus.style.display="block";
}
lastTap=now;
};

plus.onclick=()=>file.click();

file.onchange=(e)=>{
const reader=new FileReader();
reader.onload=(ev)=>{
screen.style.background=`url(${ev.target.result}) center/cover`;
plus.style.display="none";
};
reader.readAsDataURL(e.target.files[0]);
};

/* TOGGLE MOCKUP */
const toggle=document.getElementById("toggle");
let visible=true;

toggle.onclick=()=>{
const phone=document.getElementById("phone");
visible=!visible;
phone.style.display=visible?"flex":"none";
};

</script>

</body>
</html>
