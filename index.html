<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Kernel Authority • Access System</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
margin:0;
background:radial-gradient(circle at center,#06110d,#020504);
font-family:'Segoe UI',sans-serif;
color:#e6fff6;
overflow:hidden;
}

/* MATRIX */
#matrix{
position:absolute;top:0;left:0;width:100%;height:100%;
opacity:0.08;z-index:-2
}

/* 🔥 NEW: SIDE SCANNING */
.scan{
position:absolute;
top:0;
width:220px;
height:100%;
pointer-events:none;
z-index:-1;
}

.scan.left{
left:0;
background:linear-gradient(90deg, rgba(76,255,192,0.15), transparent);
animation:scanLeft 4s infinite ease-in-out;
}

.scan.right{
right:0;
background:linear-gradient(270deg, rgba(76,255,192,0.15), transparent);
animation:scanRight 4s infinite ease-in-out;
}

@keyframes scanLeft{
0%{opacity:.2;transform:translateX(-20px)}
50%{opacity:.6;transform:translateX(20px)}
100%{opacity:.2;transform:translateX(-20px)}
}

@keyframes scanRight{
0%{opacity:.2;transform:translateX(20px)}
50%{opacity:.6;transform:translateX(-20px)}
100%{opacity:.2;transform:translateX(20px)}
}

/* 🔥 NEW: PARTICLE GRID */
body::before{
content:"";
position:absolute;
width:100%;
height:100%;
background-image:radial-gradient(#4cffc0 1px, transparent 1px);
background-size:60px 60px;
opacity:0.05;
animation:moveParticles 20s linear infinite;
z-index:-3;
}

@keyframes moveParticles{
from{transform:translateY(0)}
to{transform:translateY(-200px)}
}

/* LAYOUT */
.container{
display:flex;
align-items:center;
justify-content:center;
gap:40px;
height:100vh;
}

/* CARD */
.card{
width:420px;
background:rgba(11,26,21,0.65);
backdrop-filter:blur(18px);
border-radius:18px;
padding:30px;
box-shadow:
0 0 40px rgba(0,0,0,0.8),
0 0 25px rgba(76,255,192,0.12);
animation:fadeIn 1s ease;
}

/* PHONE */
.phone{
width:260px;height:520px;background:#111;
border-radius:30px;
box-shadow:0 0 40px rgba(0,0,0,.8);
display:flex;align-items:center;justify-content:center;
opacity:0;transform:translateY(40px);
transition:0.8s ease;
}
.phone.show{opacity:1;transform:translateY(0)}

.screen{
position:relative;
width:90%;height:90%;
background:white;border-radius:20px;
overflow:hidden;
display:flex;
align-items:center;
justify-content:center;
}

/* VIDEO */
.screen video{
width:100%;
height:100%;
object-fit:cover;
border-radius:20px;
}

/* PLUS */
#plus{
position:absolute;
top:50%;left:50%;
transform:translate(-50%,-50%);
font-size:50px;
color:#4cffc0;
display:none;
cursor:pointer;
z-index:2;
}

/* FILE */
#file{display:none}

/* CROSS */
#toggle{
position:fixed;
bottom:16px;
left:16px;
font-size:16px;
color:#4cffc0;
cursor:pointer;
opacity:.7;
transition:0.3s;
}
#toggle:hover{
opacity:1;
text-shadow:0 0 8px #4cffc0;
}

/* INPUT */
input{
width:100%;padding:12px;border-radius:10px;
border:1px solid rgba(76,255,192,.25);
background:#050e0b;color:white;
}

/* BUTTON */
button{
width:100%;padding:12px;margin-top:14px;
border:none;border-radius:12px;
background:#4cffc0;color:#052019;
cursor:pointer;
transition:0.25s;
}
button:hover{
transform:translateY(-1px);
box-shadow:0 0 12px rgba(76,255,192,0.4);
}
button:active{
transform:scale(0.98);
}

/* LOG */
.logbox{
margin-top:18px;
height:30px;
font-family:monospace;
opacity:0;
transform:translateY(8px);
transition:0.4s;
}
.logbox.show{
opacity:1;
transform:translateY(0);
}

/* BAR */
.bar{
width:0%;
height:3px;
background:#4cffc0;
margin-top:6px;
transition:0.5s;
box-shadow:0 0 10px #4cffc0;
}

/* RESULT */
.result{display:none;margin-top:15px}
.row{display:flex;justify-content:space-between;padding:10px 0}
.value{color:#4cffc0;letter-spacing:2px}

/* ANIM */
@keyframes fadeIn{
from{opacity:0;transform:translateY(20px)}
to{opacity:1;transform:translateY(0)}
}
</style>
</head>

<body>

<canvas id="matrix"></canvas>

<!-- 🔥 NEW ELEMENTS -->
<div class="scan left"></div>
<div class="scan right"></div>

<div class="container">

<div class="card">
<h1>Kernel Authority</h1>
<div class="sub">Secure Instagram Access Tool</div>

<input id="user" placeholder="target username...">
<button onclick="start()">Trigger</button>

<div class="logbox" id="log"></div>
<div class="bar" id="bar"></div>

<div class="result" id="res">
<div class="row"><span>Username</span><span class="value">••••••••</span></div>
<div class="row"><span>Email</span><span class="value">••••••••</span></div>
<div class="row"><span>Password</span><span class="value">••••••••</span></div>
</div>
</div>

<div class="phone" id="phone">
<div class="screen" id="screen">
<div id="plus">+</div>
<input type="file" id="file" accept="image/*,video/*">
</div>
</div>

</div>

<div id="toggle">✕</div>

<script>

/* ===== SAME YOUR ORIGINAL JS (NO CHANGE) ===== */
const canvas=document.getElementById("matrix");
const ctx=canvas.getContext("2d");
canvas.width=innerWidth;
canvas.height=innerHeight;

const letters="01",fontSize=14;
const columns=canvas.width/fontSize;
const drops=Array(Math.floor(columns)).fill(1);

setInterval(()=>{
ctx.fillStyle="rgba(0,0,0,0.05)";
ctx.fillRect(0,0,canvas.width,canvas.height);
ctx.fillStyle="#4cffc0";
ctx.font=fontSize+"px monospace";

for(let i=0;i<drops.length;i++){
const text=letters[Math.random()*2|0];
ctx.fillText(text,i*fontSize,drops[i]*fontSize);
if(drops[i]*fontSize>canvas.height&&Math.random()>0.95) drops[i]=0;
drops[i]++;
}
},50);

/* REST CODE SAME... */
</script>

</body>
</html>
