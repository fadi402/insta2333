<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Instagram Access Tool</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{margin:0;background:#060e0b;color:#e6fff6;font-family:Arial}
.container{display:flex;align-items:center;justify-content:center;height:100vh}
.card{width:400px;background:#0b1a15;padding:25px;border-radius:12px}

input{width:100%;padding:10px;margin-top:10px;background:#050e0b;color:white;border:1px solid #4cffc0}
button{width:100%;padding:10px;margin-top:10px;background:#4cffc0;border:none;cursor:pointer}

#log{margin-top:15px;height:25px}
#bar{height:3px;background:#4cffc0;width:0%}
#res{display:none;margin-top:10px}
</style>
</head>

<body>

<div class="container">
<div class="card">
<h2>Instagram Access Tool</h2>

<input id="iguser" placeholder="Enter username">
<button onclick="start()">Search</button>

<div id="log"></div>
<div id="bar"></div>

<div id="res">
<p>Username: ••••••••</p>
<p>Email: ••••••••</p>
<p>Password: ••••••••</p>
</div>

</div>
</div>

<script>

/* LOG SYSTEM */
const logs=[
"Initializing request...",
"Verifying access...",
"Syncing nodes...",
"Processing data...",
"Finalizing..."
];

let i=0;

function start(){

const user=document.getElementById("iguser");
if(!user.value.trim()) return;

i=0;
run();

}

function run(){

if(i>=logs.length){
document.getElementById("res").style.display="block";
return;
}

const log=document.getElementById("log");
const bar=document.getElementById("bar");

log.innerText=logs[i];
bar.style.width=((i+1)/logs.length)*100+"%";

i++;

setTimeout(run,1000);

}

</script>

</body>
</html>
