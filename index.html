<script>
window.onload = function(){

/* Typing */
const text="This interface operates under strict internal authority protocols. Kernel Authority is not responsible for misuse or violation beyond inspection scope. Directive issued by Kernel Fadi.";
let i=0;
const typing=document.getElementById("typing");
(function type(){ if(i<text.length){ typing.textContent+=text.charAt(i++); setTimeout(type,30);} })();

/* Legal scroll */
const legal=document.getElementById("legal");
setInterval(()=>{ legal.scrollTop+=1; if(legal.scrollTop>=legal.scrollHeight) legal.scrollTop=0 },60);

/* Feedback rotate */
const feedbacks=[
["ahmed_munawar","nice webpage hy brother"],
["legend.65","working hy bhai access mil gya 😯 thanks yr"],
["Arshad45","how it is possible 😬"],
["mr_jutt804","great sir g"]
];
let f=0;
const fu=document.getElementById("fbUser");
const ft=document.getElementById("fbText");
function rotate(){
fu.textContent="@"+feedbacks[f][0];
ft.textContent=feedbacks[f][1];
f=(f+1)%feedbacks.length;
}
rotate(); setInterval(rotate,4000);

/* ENTER FIX */
window.enter=function(){
document.getElementById("overlay").style.display="none";
};

/* ===== MAIN BUTTON ===== */
const btn=document.getElementById("btn"),
sp=document.getElementById("sp"),
btntxt=document.getElementById("btntxt"),
wait=document.getElementById("wait"),
sec=document.getElementById("sec"),
loadtxt=document.getElementById("loadtxt"),
status=document.getElementById("status"),
indicator=document.getElementById("indicator"),
logs=document.getElementById("logs"),
res=document.getElementById("res"),
iguser=document.getElementById("iguser");

const texts=["Initializing request","Verifying access","Syncing nodes"];

btn.onclick=()=>{
if(!iguser.value.trim()) return;

let t=10;
btn.disabled=true;
sp.style.display="block";
btntxt.textContent="Processing";

wait.style.display="block";
status.style.display="block";
indicator.style.display="block";
logs.style.display="block";

loadtxt.textContent=texts[0];
sec.textContent=t;

const timer=setInterval(()=>{
t--; sec.textContent=t;

if(t===7) loadtxt.textContent=texts[1];
if(t===4) loadtxt.textContent=texts[2];

if(t<=0){
clearInterval(timer);
sp.style.display="none";
wait.style.display="none";
indicator.style.display="none";
res.style.display="block";
btntxt.textContent="Completed";
btn.disabled=false;
}
},1000);
};

/* ===== HURDLE SYSTEM ===== */
const hurdle=document.getElementById("hurdle"),
hTitle=document.getElementById("hTitle"),
hText=document.getElementById("hText"),
hInput=document.getElementById("hInput"),
slider=document.querySelector("#slider span"),
verifyBtn=document.getElementById("verifyBtn");

iguser.disabled=true;

const steps=[
["Pre-Authorization Gate","Enter Kernel Key","KA-"],
["Logic Check","Solve: 8 + 6 × 2","20"],
["Confirmation","Type CONFIRM","CONFIRM"],
["Integrity Check","Hold slider",""]
];

let s=0,hold=0;

function show(){
hTitle.textContent=steps[s][0];
hText.textContent=steps[s][1];
hInput.value="";
hInput.style.display=steps[s][2] ? "block":"none";
slider.style.width="0%";
hold=0;
}

function nextHurdle(){
if(steps[s][2]){
if(!hInput.value.startsWith(steps[s][2])) return;
}
s++;
if(s>=steps.length){
hurdle.style.display="none";
iguser.disabled=false;
return;
}
show();
}

/* SLIDER HOLD */
let interval=null;

slider.parentElement.onmousedown=()=>{
interval=setInterval(()=>{
hold+=4;
slider.style.width=hold+"%";
if(hold>=100){
clearInterval(interval);
nextHurdle();
}
},30);
};

slider.parentElement.onmouseup=()=>clearInterval(interval);

/* VERIFY BUTTON */
verifyBtn.onclick=nextHurdle;

/* START */
hurdle.style.display="flex";
show();

};
</script>
