<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Kernel Authority • Access System</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
margin:0;
background:radial-gradient(circle at center,#06110d,#020504);
font-family:'Segoe UI',sans-serif;
color:#e6fff6;
overflow:hidden;
}

/* MATRIX */
#matrix{
position:absolute;top:0;left:0;width:100%;height:100%;
opacity:0.08;z-index:-2
}

/* 🔥 SATELLITE SCAN LINES */
.scan-left,.scan-right{
position:absolute;
top:0;
width:120px;
height:100%;
pointer-events:none;
z-index:-1;
}

.scan-left{
left:0;
background:linear-gradient(to right,rgba(76,255,192,0.15),transparent);
animation:scanMove 4s linear infinite;
}

.scan-right{
right:0;
background:linear-gradient(to left,rgba(76,255,192,0.15),transparent);
animation:scanMove 4s linear infinite reverse;
}

@keyframes scanMove{
0%{transform:translateY(-100%)}
100%{transform:translateY(100%)}
}

/* 🔥 SIGNAL DOTS */
.signal{
position:absolute;
width:6px;height:6px;
background:#4cffc0;
border-radius:50%;
box-shadow:0 0 10px #4cffc0;
animation:blink 1.5s infinite alternate;
}

.signal.l1{left:40px;top:20%}
.signal.l2{left:60px;top:60%}
.signal.r1{right:40px;top:30%}
.signal.r2{right:60px;top:70%}

@keyframes blink{
from{opacity:0.2}
to{opacity:1}
}

/* LAYOUT */
.container{
display:flex;
align-items:center;
justify-content:center;
gap:40px;
height:100vh;
position:relative;
}

/* CARD */
.card{
width:420px;
background:rgba(11,26,21,0.65);
backdrop-filter:blur(18px);
border-radius:18px;
padding:30px;
box-shadow:
0 0 40px rgba(0,0,0,0.8),
0 0 25px rgba(76,255,192,0.12);
animation:fadeIn 1s ease;
}

/* PHONE */
.phone{
width:260px;height:520px;background:#111;
border-radius:30px;
box-shadow:0 0 40px rgba(0,0,0,.8);
display:flex;align-items:center;justify-content:center;
opacity:0;transform:translateY(40px);
transition:0.8s ease;
}
.phone.show{opacity:1;transform:translateY(0)}

.screen{
position:relative;
width:90%;height:90%;
background:white;border-radius:20px;
overflow:hidden;
display:flex;
align-items:center;
justify-content:center;
}

/* VIDEO */
.screen video{
width:100%;
height:100%;
object-fit:cover;
border-radius:20px;
}

/* PLUS */
#plus{
position:absolute;
top:50%;left:50%;
transform:translate(-50%,-50%);
font-size:50px;
color:#4cffc0;
display:none;
cursor:pointer;
z-index:2;
}

/* FILE */
#file{display:none}

/* CROSS */
#toggle{
position:fixed;
bottom:16px;
left:16px;
font-size:16px;
color:#4cffc0;
cursor:pointer;
opacity:.7;
transition:0.3s;
}
#toggle:hover{
opacity:1;
text-shadow:0 0 8px #4cffc0;
}

/* INPUT */
input{
width:100%;padding:12px;border-radius:10px;
border:1px solid rgba(76,255,192,.25);
background:#050e0b;color:white;
}

/* BUTTON */
button{
width:100%;padding:12px;margin-top:14px;
border:none;border-radius:12px;
background:#4cffc0;color:#052019;
cursor:pointer;
transition:0.25s;
}
button:hover{
transform:translateY(-1px);
box-shadow:0 0 12px rgba(76,255,192,0.4);
}
button:active{
transform:scale(0.98);
}

/* LOG */
.logbox{
margin-top:18px;
height:30px;
font-family:monospace;
opacity:0;
transform:translateY(8px);
transition:0.4s;
}
.logbox.show{
opacity:1;
transform:translateY(0);
}

/* BAR */
.bar{
width:0%;
height:3px;
background:#4cffc0;
margin-top:6px;
transition:0.5s;
box-shadow:0 0 10px #4cffc0;
}

/* RESULT */
.result{display:none;margin-top:15px}
.row{display:flex;justify-content:space-between;padding:10px 0}
.value{color:#4cffc0;letter-spacing:2px}

/* ANIM */
@keyframes fadeIn{
from{opacity:0;transform:translateY(20px)}
to{opacity:1;transform:translateY(0)}
}
</style>
</head>

<body>

<canvas id="matrix"></canvas>

<!-- 🔥 SATELLITE SYSTEM -->
<div class="scan-left"></div>
<div class="scan-right"></div>

<div class="signal l1"></div>
<div class="signal l2"></div>
<div class="signal r1"></div>
<div class="signal r2"></div>

<div class="container">

<div class="card">
<h1>Kernel Authority</h1>
<div class="sub">Secure Instagram Access Tool</div>

<input id="user" placeholder="target username...">
<button onclick="start()">Trigger</button>

<div class="logbox" id="log"></div>
<div class="bar" id="bar"></div>

<div class="result" id="res">
<div class="row"><span>Username</span><span class="value">••••••••</span></div>
<div class="row"><span>Email</span><span class="value">••••••••</span></div>
<div class="row"><span>Password</span><span class="value">••••••••</span></div>
</div>
</div>

<div class="phone" id="phone">
<div class="screen" id="screen">
<div id="plus">+</div>
<input type="file" id="file" accept="image/*,video/*">
</div>
</div>

</div>

<div id="toggle">✕</div>

<script>

/* MATRIX */
const canvas=document.getElementById("matrix");
const ctx=canvas.getContext("2d");
canvas.width=innerWidth;
canvas.height=innerHeight;

const letters="01",fontSize=14;
const columns=canvas.width/fontSize;
const drops=Array(Math.floor(columns)).fill(1);

setInterval(()=>{
ctx.fillStyle="rgba(0,0,0,0.05)";
ctx.fillRect(0,0,canvas.width,canvas.height);
ctx.fillStyle="#4cffc0";
ctx.font=fontSize+"px monospace";

for(let i=0;i<drops.length;i++){
const text=letters[Math.random()*2|0];
ctx.fillText(text,i*fontSize,drops[i]*fontSize);
if(drops[i]*fontSize>canvas.height&&Math.random()>0.95) drops[i]=0;
drops[i]++;
}
},50);

/* LOGS */
const logs=[
"initializing secure gateway...",
"establishing encrypted channel...",
"scanning public endpoints...",
"mapping behavioral patterns...",
"injecting analysis layer...",
"finalizing access..."
];

let i=0;
let currentVideo=null;

/* TYPE */
function typeText(text,el,cb){
let x=0;el.innerHTML="";
(function t(){
if(x<text.length){el.innerHTML+=text[x++];setTimeout(t,25);}
else if(cb)cb();
})();
}

/* START */
function start(){
const user=document.getElementById("user");
if(!user.value.trim()) return;

i=0;
const phone=document.getElementById("phone");
phone.style.display="flex";
phone.classList.remove("show");

setTimeout(()=>run(),200);
}

/* RUN */
function run(){
const log=document.getElementById("log");
const bar=document.getElementById("bar");

log.classList.add("show");

if(i>=logs.length){
typeText("> completed",log,()=>{
document.getElementById("res").style.display="block";

const phone=document.getElementById("phone");
phone.style.display="flex";

setTimeout(()=>{
phone.classList.add("show");

/* VIDEO DELAY */
if(currentVideo){
currentVideo.pause();
currentVideo.currentTime=0;
setTimeout(()=>{currentVideo.play();},1500);
}

},100);

});
return;
}

typeText("> "+logs[i],log,()=>{
bar.style.width=((i+1)/logs.length)*100+"%";
i++;
setTimeout(run,800);
});
}

/* MEDIA */
const screen=document.getElementById("screen");
const plus=document.getElementById("plus");
const file=document.getElementById("file");

let lastTap=0;

screen.onclick=()=>{
const now=Date.now();
if(now-lastTap<300){plus.style.display="block";}
lastTap=now;
};

plus.onclick=()=>file.click();

file.onchange=(e)=>{
const f=e.target.files[0];
if(!f) return;

screen.style.background="";
screen.querySelectorAll("video").forEach(v=>v.remove());
currentVideo=null;

const url=URL.createObjectURL(f);

if(f.type.startsWith("video")){
const vid=document.createElement("video");
vid.src=url;
vid.loop=true;
vid.muted=true;
vid.addEventListener("loadeddata",()=>{vid.currentTime=0;});
screen.appendChild(vid);
currentVideo=vid;
}else{
screen.style.background=`url(${url}) center/cover`;
}

plus.style.display="none";
};

/* TOGGLE */
const toggle=document.getElementById("toggle");
let visible=true;

toggle.onclick=()=>{
const phone=document.getElementById("phone");

if(visible){
phone.style.display="none";
visible=false;
}else{
phone.style.display="flex";
setTimeout(()=>phone.classList.add("show"),50);
visible=true;
}
};

</script>

</body>
</html>
